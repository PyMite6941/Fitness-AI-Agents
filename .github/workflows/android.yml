name: Build Android APK

# Free cloud build — no Android phone, no Mac, no local install needed.
# Run it from the repo's Actions tab (Run workflow), or it runs on changes to
# the app. Download the built APK from the run's "Artifacts" section.

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'mobile/android/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write          # lets the job commit the published APK back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK (+ accept licenses)
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'   # required by Android Gradle Plugin 8.5

      - name: Build debug APK
        working-directory: mobile/android
        run: gradle assembleDebug --no-daemon --stacktrace --info

      - name: Upload APK (downloadable artifact)
        uses: actions/upload-artifact@v4
        with:
          name: fitness-ai-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to the website (/app download)
        if: success()
        run: |
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk frontend/public/fitness-ai.apk
          python3 - <<'PY'
          import json
          p = "frontend/public/version.json"
          d = json.load(open(p))
          d["androidApp"]["available"] = True
          json.dump(d, open(p, "w"), indent=2)
          PY
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/fitness-ai.apk frontend/public/version.json
          git commit -m "ci: publish built APK to /app [skip ci]" || echo "nothing to publish"
          git push
